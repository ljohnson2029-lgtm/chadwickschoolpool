    <!-- Critical CSS inline for above-the-fold content -->
    <style>
      /* Critical CSS - prevents FOUC */
      html { background-color: #f8fafc; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #root { min-height: 100vh; }
      /* Loading animation for SSR/initial load */
      .initial-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, rgba(30,64,175,0.05) 0%, rgba(255,255,255,1) 50%, rgba(30,58,138,0.05) 100%);
      }
      .initial-loader__spinner {
        width: 40px; height: 40px; border: 3px solid rgba(30,64,175,0.1);
        border-top-color: #1e40af; border-radius: 50%; animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- Initial loader - removed by React hydration -->
    <div id="initial-loader" class="initial-loader">
      <div class="initial-loader__spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Remove initial loader once app loads -->
    <script>
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(function() { loader.remove(); }, 300);
        }
      });
    </script>
  </body>
</html>
